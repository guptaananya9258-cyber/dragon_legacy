<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskBoard — To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #17171b;
    --surface2: #1f1f26;
    --border: #2a2a35;
    --accent: #c8f04d;
    --accent2: #f04d8a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --done-bg: #1a2010;
    --done-border: #3a5020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,77,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,77,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing blob */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -150px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(200,240,77,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  /* Header */
  header {
    margin-bottom: 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    display: flex;
    flex-direction: column;
  }

  .brand-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  h1 {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span {
    color: var(--accent);
  }

  .stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .stat-num.done { color: var(--accent); }
  .stat-num.total { color: var(--muted); }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .stat-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
  }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 36px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 12px rgba(200,240,77,0.5);
  }

  /* Input area */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .task-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    padding: 14px 18px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .task-input::placeholder { color: var(--muted); }

  .task-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,240,77,0.12);
  }

  .add-btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 24px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }

  .add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(200,240,77,0.3);
  }

  .add-btn:active { transform: translateY(0); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    width: fit-content;
  }

  .filter-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .filter-btn.active {
    background: var(--surface2);
    color: var(--text);
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 80px;
  }

  /* Task item */
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, background 0.2s, transform 0.2s, opacity 0.3s;
    animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .task-item:hover {
    border-color: rgba(200,240,77,0.2);
    transform: translateX(2px);
  }

  .task-item.completed {
    background: var(--done-bg);
    border-color: var(--done-border);
  }

  .task-item.removing {
    animation: slideOut 0.3s ease forwards;
  }

  @keyframes slideOut {
    to { opacity: 0; transform: translateX(-20px) scale(0.97); height: 0; padding: 0; margin: 0; }
  }

  /* Checkbox */
  .check-btn {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .check-btn:hover { border-color: var(--accent); }

  .task-item.completed .check-btn {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-btn svg {
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task-item.completed .check-btn svg { opacity: 1; }

  /* Task title */
  .task-title {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.4;
    word-break: break-word;
    transition: color 0.2s, text-decoration 0.2s;
  }

  .task-item.completed .task-title {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--done-border);
  }

  /* Task number badge */
  .task-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 20px;
  }

  /* Delete button */
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s, background 0.2s;
  }

  .task-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--accent2); background: rgba(240,77,138,0.1); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-text {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .footer-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .footer-tag span {
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="brand">
      <div class="brand-tag">// C++ OOP Project</div>
      <h1>Task<span>Board</span></h1>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num done" id="doneCount">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num total" id="totalCount">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
  </header>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="input-row">
    <input class="task-input" id="taskInput" type="text" placeholder="Add a new task…" maxlength="120" />
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Done</button>
  </div>

  <div class="task-list" id="taskList"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">◻</div>
    <div class="empty-text">No tasks here. Add one above!</div>
  </div>

  <div class="footer">
    <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
    <div class="footer-tag">Built from <span>C++ OOP</span> → HTML</div>
  </div>

</div>

<script>
  // --- State (mirrors C++ vector<Task>) ---
  let tasks = JSON.parse(localStorage.getItem('taskboard') || '[]');
  let currentFilter = 'all';

  // --- Persistence (mirrors saveTasks / loadTasks) ---
  function save() {
    localStorage.setItem('taskboard', JSON.stringify(tasks));
  }

  // --- Render ---
  function render() {
    const list = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');

    const filtered = tasks.filter(t => {
      if (currentFilter === 'active') return !t.completed;
      if (currentFilter === 'done') return t.completed;
      return true;
    });

    list.innerHTML = '';

    if (filtered.length === 0) {
      empty.classList.add('visible');
    } else {
      empty.classList.remove('visible');
      filtered.forEach((task, i) => {
        const realIdx = tasks.indexOf(task);
        const item = document.createElement('div');
        item.className = 'task-item' + (task.completed ? ' completed' : '');
        item.dataset.id = realIdx;
        item.innerHTML = `
          <span class="task-num">${String(i + 1).padStart(2, '0')}</span>
          <button class="check-btn" onclick="toggleTask(${realIdx})" title="Mark complete">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5l3.5 3.5L11 1" stroke="#0d0d0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="task-title">${escHtml(task.title)}</span>
          <button class="del-btn" onclick="deleteTask(${realIdx})" title="Delete">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        `;
        list.appendChild(item);
      });
    }

    updateStats();
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('totalCount').textContent = total;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- Actions (mirror C++ functions) ---
  function addTask() {
    const input = document.getElementById('taskInput');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }
    tasks.push({ title, completed: false });
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggleTask(idx) {
    tasks[idx].completed = !tasks[idx].completed;
    save();
    render();
  }

  function deleteTask(idx) {
    const items = document.querySelectorAll('.task-item');
    const realItems = Array.from(items).filter(el => parseInt(el.dataset.id) === idx);
    if (realItems.length) {
      realItems[0].classList.add('removing');
      setTimeout(() => {
        tasks.splice(idx, 1);
        save();
        render();
      }, 280);
    }
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    save();
    render();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // Enter key to add
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Seed with example tasks if fresh
  if (tasks.length === 0) {
    tasks = [
      { title: 'Understand OOP concepts: Abstraction, Encapsulation', completed: true },
      { title: 'Implement TaskBase abstract class with pure virtual function', completed: true },
      { title: 'Build Task derived class with getters & setters', completed: false },
      { title: 'Add file I/O for saving & loading tasks', completed: false },
      { title: 'Convert C++ project to a web app 🎉', completed: false },
    ];
    save();
  }

  render();
</script>
</body>
</html>
